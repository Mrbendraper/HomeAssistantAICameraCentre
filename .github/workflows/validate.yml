name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration
          # brands: images ship inside the integration (HA 2026.3 brands
          # proxy), not the central home-assistant/brands repo.
          # description/topics: set on the GitHub repo (Settings / About),
          # not in code — drop these two ignores once they're added.
          ignore: brands description topics
